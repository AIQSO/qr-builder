name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check qr_builder/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=qr_builder --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify installation
        run: |
          pip install dist/*.whl
          python -c "from qr_builder import __version__; print(f'QR Builder v{__version__}')"
          qr-builder --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qr-builder-api .

      - name: Test Docker image
        run: |
          docker run -d --name qr-test -p 8000:8000 \
            -e QR_BUILDER_ENV=development \
            -e QR_BUILDER_BACKEND_SECRET=ci-smoke-test-secret \
            qr-builder-api
          # Wait up to 30s for the app to become ready instead of a flat sleep
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Health check passed after ${i}s"
              docker stop qr-test
              exit 0
            fi
            sleep 1
          done
          echo "Health check did not pass within 30s. Container logs:"
          docker logs qr-test
          docker stop qr-test
          exit 1
