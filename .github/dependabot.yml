version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      runtime:
        patterns: ["*"]
        exclude-patterns: ["pytest*", "ruff", "mypy", "pip-audit", "deptry", "pip-tools", "httpx"]
      dev-tooling:
        patterns: ["pytest*", "ruff", "mypy", "pip-audit", "deptry", "pip-tools"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
